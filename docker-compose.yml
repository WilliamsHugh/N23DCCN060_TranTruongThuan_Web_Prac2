networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:

services:
  # ─── Databases ────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: products_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    networks: [microservices-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d products_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: orders_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks: [microservices-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [microservices-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application Services ─────────────────
  product-service:
    build: ./product-service
    container_name: product_service
    env_file:
      - ./product-service/.env 
    ports:
      - "3001:3001"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [microservices-net]

  order-service:
    build: ./order-service
    container_name: order_service
    env_file:
    - ./order-service/.env
    ports:
      - "3002:3002"
    depends_on:
      mongo: { condition: service_healthy }
    networks: [microservices-net]

  auth-service:
    build: ./auth-service
    container_name: auth_service
    env_file:
    - ./auth-service/.env
    ports:
      - "3003:3003"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [microservices-net]

  # ─── API Gateway ──────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api_gateway
    env_file:
    - ./api-gateway/.env
    ports:
      - "3000:3000"
    depends_on: [product-service, order-service, auth-service]
    networks: [microservices-net]