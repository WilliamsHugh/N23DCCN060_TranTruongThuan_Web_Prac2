version: "3.9"

networks:
  microservices-net:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: products_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    ports:
      - "5432:5432"
    networks: [microservices-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: orders_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks: [microservices-net]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build: ./product-service
    container_name: product_service
    environment:
      NODE_ENV: production
      PORT: 3001
      SERVICE_NAME: product-service
      DATABASE_URL: postgresql://admin:secret@postgres:5432/products_db
    ports:
      - "3001:3001"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [microservices-net]

  order-service:
    build: ./order-service
    container_name: order_service
    environment:
      NODE_ENV: production
      PORT: 3002
      SERVICE_NAME: order-service
      MONGODB_URI: mongodb://admin:secret@mongo:27017/orders_db?authSource=admin
    ports:
      - "3002:3002"
    depends_on:
      mongo: { condition: service_healthy }
    networks: [microservices-net]

  auth-service:
    build: ./auth-service
    container_name: auth_service
    environment:
      NODE_ENV: production
      PORT: 3003
      SERVICE_NAME: auth-service
      DATABASE_URL: postgresql://admin:secret@postgres:5432/auth_db
      JWT_SECRET: your-super-secret-random-string-at-least-32-chars
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - "3003:3003"
    depends_on:
      postgres: { condition: service_healthy }
    networks: [microservices-net]

  api-gateway:
    build: ./api-gateway
    container_name: api_gateway
    environment:
      NODE_ENV: production
      PORT: 3000
      PRODUCT_SERVICE_URL: http://product-service:3001
      ORDER_SERVICE_URL: http://order-service:3002
      AUTH_SERVICE_URL: http://auth-service:3003
      JWT_SECRET: your-super-secret-random-string-at-least-32-chars
    ports:
      - "3000:3000"
    depends_on: [product-service, order-service]
    networks: [microservices-net]